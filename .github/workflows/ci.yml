name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: lint-and-test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev dependencies
        run: |
          python -m pip install ".[dev]"

      - name: Black (format check)
        run: black --check .

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy src

      - name: Bandit (security scan)
        run: bandit -r src

      - name: Pytest
        run: pytest -v

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rmlw .
